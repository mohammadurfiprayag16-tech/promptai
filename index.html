<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Premium AI Prompt</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="bg"></div>

<div class="card">

<h1>🔥 Premium AI Prompt</h1>

<p>Enter your email to unlock the password box.</p>

<div id="count"></div>

<form id="emailForm">

<input
id="email"
type="email"
placeholder="Enter your email"
required>

<button type="submit">
Continue
</button>

</form>

<div id="pw" style="display:none;">

<input
id="pass"
type="password"
placeholder="Enter Password">

<button
type="button"
onclick="unlock()">
Open Prompt
</button>

</div>

<pre
id="prompt"
style="display:none;white-space:pre-wrap;">

PASTE YOUR AI PROMPT HERE

</pre>

</div>

<script>

const end = Date.now() + 86400000;

setInterval(() => {

let d = end - Date.now();

if(d<0) d=0;

let h=Math.floor(d/3600000);

let m=Math.floor((d%3600000)/60000);

let s=Math.floor((d%60000)/1000);

document.getElementById("count").innerHTML=
`⏳ Offer Ends In ${h}h ${m}m ${s}s`;

},1000);

document.getElementById("emailForm").addEventListener("submit",function(e){

e.preventDefault();

const email=document.getElementById("email").value;

localStorage.setItem("email",email);

document.getElementById("pw").style.display="block";

alert("Email Saved Successfully!");

});

function unlock(){

const password=document.getElementById("pass").value.trim();

if(password==="1234"){

document.getElementById("prompt").style.display="block";

alert("✅ Prompt Unlocked!");

}else{

alert("❌ Wrong Password");

}

}

</script>

</body>

</html>
